services:
  tor:
    build:
      context: ./docker/tor
      dockerfile: Dockerfile
    image: custom-tor-hs-alpine:latest
    container_name: tor-hs-alpine
    user: "${TOR_UID:-1000}:${TOR_GID:-1000}" # Run as non-root with host-mapped UID/GID
    read_only: true # Read-only root filesystem
    pids_limit: ${TOR_PIDS_LIMIT:-64}
    mem_limit: "${TOR_MEM_LIMIT:-256m}"
    cpus: "${TOR_CPUS:-0.50}"
    tmpfs:
      - /run:rw,noexec,nosuid,nodev,uid=${TOR_UID:-1000},gid=${TOR_GID:-1000},mode=0700
      - /tmp:rw,noexec,nosuid,nodev,uid=${TOR_UID:-1000},gid=${TOR_GID:-1000},mode=0700
    volumes:
      - ./data/tor_hs_data:/var/lib/tor:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/lib/tor/hs/hostname"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      tor-public:
      tor-hidden-internal:
        ipv4_address: 172.30.12.10
      tor-socks-internal:
        ipv4_address: 172.30.13.10
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL

  ollama-proxy:
    build:
      context: ./docker/ollama-proxy
      dockerfile: Dockerfile
    image: ollama-proxy:latest
    container_name: ollama-proxy
    user: nginx # Run as non-root (nginx user from base image)
    pids_limit: ${OLLAMA_PROXY_PIDS_LIMIT:-128}
    mem_limit: "${OLLAMA_PROXY_MEM_LIMIT:-128m}"
    cpus: "${OLLAMA_PROXY_CPUS:-0.50}"
    expose:
      - "11434" # Expose port to webui-internal network
      - "1234" # Expose OpenAI-compatible passthrough (LM Studio)
    read_only: true # Read-only root filesystem
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,nodev,uid=101,gid=101,mode=0700
      - /var/run:rw,noexec,nosuid,nodev,uid=101,gid=101,mode=0700
      - /var/log/nginx:rw,noexec,nosuid,nodev,uid=101,gid=101,mode=0700
      - /var/tmp:rw,noexec,nosuid,nodev,uid=101,gid=101,mode=0700
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/run/nginx.pid && kill -0 $(cat /var/run/nginx.pid)"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      webui-internal:
        ipv4_address: 172.30.10.10
      ollama-access: # Network with access to host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL # Drop all capabilities

  tor-http-proxy:
    build:
      context: ./docker/tor-http-proxy
      dockerfile: Dockerfile
    image: tor-http-proxy:latest
    container_name: tor-http-proxy
    user: privoxy
    pids_limit: ${TOR_HTTP_PROXY_PIDS_LIMIT:-64}
    mem_limit: "${TOR_HTTP_PROXY_MEM_LIMIT:-64m}"
    cpus: "${TOR_HTTP_PROXY_CPUS:-0.25}"
    depends_on:
      tor:
        condition: service_started
    expose:
      - "8118"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=100,gid=101,mode=0700
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pidof privoxy >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      tor-socks-internal:
        ipv4_address: 172.30.13.20
      webui-egress:
        ipv4_address: 172.30.11.10
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL

  webui-fw:
    build:
      context: ./docker/webui-fw
      dockerfile: Dockerfile
    image: webui-fw:latest
    container_name: open-webui-fw
    user: root
    pids_limit: ${WEBUI_FW_PIDS_LIMIT:-64}
    mem_limit: "${WEBUI_FW_MEM_LIMIT:-64m}"
    cpus: "${WEBUI_FW_CPUS:-0.25}"
    depends_on:
      ollama-proxy:
        condition: service_healthy
      tor-http-proxy:
        condition: service_healthy
    environment:
      - OLLAMA_PROXY_IP=172.30.10.10
      - TOR_HTTP_PROXY_IP=172.30.11.10
      - PQ_PROXY_IP=172.30.10.30
      - WEBUI_PORT=8080
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=0,gid=0,mode=0700
      - /run:rw,noexec,nosuid,nodev,uid=0,gid=0,mode=0700
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/firewall.ready"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      webui-internal:
        ipv4_address: 172.30.10.20
        aliases:
          - webui
      webui-egress:
        ipv4_address: 172.30.11.20
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN

  webui:
    build:
      context: ./docker/webui
    container_name: open-webui
    user: "${WEBUI_UID:-1000}:${WEBUI_GID:-1000}" # Run as non-root with host-mapped UID/GID
    pids_limit: ${WEBUI_PIDS_LIMIT:-512}
    mem_limit: "${WEBUI_MEM_LIMIT:-2g}"
    cpus: "${WEBUI_CPUS:-2.00}"
    depends_on:
      webui-fw:
        condition: service_healthy
    network_mode: "service:webui-fw"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://172.30.10.10:11434} # Use fixed internal IPv4 by default
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY} # Value loaded from .env file by docker-compose
      - HTTP_PROXY=http://172.30.11.10:8118
      - HTTPS_PROXY=http://172.30.11.10:8118
      - ALL_PROXY=http://172.30.11.10:8118
      - NO_PROXY=172.30.10.10,172.30.10.30,ollama-proxy,pq-proxy,127.0.0.1,localhost
    read_only: true # Read-only root filesystem
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=${WEBUI_UID:-1000},gid=${WEBUI_GID:-1000},mode=0700
      - /app/backend/open_webui/static:rw,noexec,nosuid,nodev,uid=${WEBUI_UID:-1000},gid=${WEBUI_GID:-1000},mode=0700
    volumes:
      - ./data/open_webui_data:/app/backend/data:rw # Writable volume for app data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8080)); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL # Drop all capabilities

  pq-proxy:
    build:
      context: ./docker/pq-proxy
      dockerfile: Dockerfile
    image: pq-nginx-kyber768:latest
    container_name: pq-nginx-proxy-kyber768
    user: nginx # Run as non-root
    pids_limit: ${PQ_PROXY_PIDS_LIMIT:-128}
    mem_limit: "${PQ_PROXY_MEM_LIMIT:-256m}"
    cpus: "${PQ_PROXY_CPUS:-1.00}"
    depends_on:
      webui:
        condition: service_healthy # Start only once WebUI is actually serving
    expose:
      - "443" # Expose port only to the internal Docker network (Tor will access it)
    read_only: true # Read-only root filesystem
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,nodev,uid=101,gid=101,mode=0700
      - /var/run:rw,noexec,nosuid,nodev,uid=101,gid=101,mode=0700
      - /var/log/nginx:rw,noexec,nosuid,nodev,uid=101,gid=101,mode=0700
      - /var/tmp:rw,noexec,nosuid,nodev,uid=101,gid=101,mode=0700
    volumes:
      - ./data/pq_proxy_certs:/etc/nginx/ssl:ro # Read-only certs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/run/nginx.pid && kill -0 $(cat /var/run/nginx.pid)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      tor-hidden-internal:
        ipv4_address: 172.30.12.30
        aliases:
          - pq-proxy # Ensure Tor can always resolve the HiddenServicePort upstream name.
      webui-internal:
        ipv4_address: 172.30.10.30
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL # Drop all capabilities

networks:
  tor-public:
    driver: bridge
  tor-hidden-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.12.0/24
  tor-socks-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.13.0/24
  webui-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.10.0/24
  webui-egress:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.11.0/24
  ollama-access:
    driver: bridge
