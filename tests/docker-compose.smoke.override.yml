services:
  # Keep smoke tests focused on networking/TLS/Tor behavior and avoid pulling
  # the very large Open WebUI runtime image in CI.
  webui:
    image: python:3.12-slim@sha256:ccc7089399c8bb65dd1fb3ed6d55efa538a3f5e7fca3f5988ac3b5b87e593bf0
    build: null
    entrypoint:
      - python
      - -B
      - -m
      - http.server
      - "8080"
      - --bind
      - 0.0.0.0
    command: []
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://172.30.10.10:11434}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - NO_PROXY=172.30.10.10,172.30.10.30,ollama-proxy,pq-proxy,127.0.0.1,localhost
      - PYTHONDONTWRITEBYTECODE=1
    volumes: []
    read_only: true
