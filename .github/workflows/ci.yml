name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run static checks
        run: make test-static

  docker-smoke:
    runs-on: ubuntu-latest
    needs: static
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Docker smoke test
        run: make test-docker-smoke

      - name: Dump compose status on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color --tail=200 tor tor-http-proxy webui-fw ollama-proxy webui pq-proxy || true
