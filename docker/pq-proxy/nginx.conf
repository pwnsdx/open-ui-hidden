load_module modules/ngx_http_brotli_static_module.so;
load_module modules/ngx_http_brotli_filter_module.so;

worker_processes auto;
pid /var/run/nginx.pid;

pcre_jit  on;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    sendfile        on;
    aio             threads;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Open File Cache
    open_file_cache max=2000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Proxy Cache Configuration
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=webui_cache:10m max_size=10g inactive=60m use_temp_path=off;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/x-component
        text/javascript application/javascript application/x-javascript
        text/xml application/xml application/rss+xml
        application/json
        application/vnd.ms-fontobject
        font/truetype font/opentype
        image/svg+xml;

    # Brotli Compression
    brotli on;
    brotli_comp_level 6; # Adjust as needed (1-11, higher is more compression but slower)
    brotli_static on; # Serve pre-compressed .br files if available
    brotli_types
        text/plain
        text/css
        text/x-component
        text/javascript application/javascript application/x-javascript
        text/xml application/xml application/rss+xml
        application/json
        application/vnd.ms-fontobject
        font/truetype font/opentype
        image/svg+xml;

    # Dynamic Record Size
    ssl_dyn_rec_enable on;

    # SSL/TLS configuration for BoringSSL with X25519Kyber768Draft00
    ssl_protocols TLSv1.3;

    # Disable preference for server ciphers
    ssl_prefer_server_ciphers off;

    # Configure the specific hybrid Post-Quantum Key Exchange curve
    # This is the identifier that Firefox/Tor Browser Alpha uses for X25519 with Kyber768.
    ssl_ecdh_curve X25519Kyber768Draft00;

    ssl_certificate     /etc/nginx/ssl/cert.pem; # Mounted from ./data/pq_proxy_certs/
    ssl_certificate_key /etc/nginx/ssl/key.pem; # Mounted from ./data/pq_proxy_certs/

    # SSL Session Settings
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m; # ~40000 sessions
    ssl_session_tickets off; # Recommended for Perfect Forward Secrecy

    upstream webui_backend {
        server webui:8080;
        keepalive 32; # Number of idle keepalive connections
    }

    server {
        listen 443 ssl;
        http2 on;

        server_name _; # Accepts any hostname (for the .onion service)

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Proxy-Cache $upstream_cache_status; # To check cache status

        location /api/ {
            proxy_pass http://webui_backend;

            # Do not cache API responses
            proxy_no_cache 1;
            proxy_cache_bypass 1;

            # Standard proxy settings (ensure consistency)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade; # For WebSockets
            proxy_set_header Connection "upgrade";  # For WebSockets
            proxy_read_timeout 90s;
            proxy_buffering off;
        }

        location / {
            proxy_pass http://webui_backend; # Forward to the upstream block
            proxy_cache webui_cache;
            proxy_cache_valid 200 302 10m;
            proxy_cache_valid 404 1m;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade; # For WebSockets
            proxy_set_header Connection "upgrade";  # For WebSockets
            proxy_read_timeout 90s;
            proxy_buffering on;
            proxy_buffers 8 16k; # Number and size of buffers
            proxy_buffer_size 16k; # Size of the buffer for the first part of the response
        }
    }
} 